name: quran_audio_web
description: Promotional landing page for Quran Audio - Free Quran MP3 app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  visibility_detector: ^0.4.0+2
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/screens/
    - assets/qaris/
    - assets/icons/
    - assets/qr/
  fonts:
    - family: Uthmani
      fonts:
        - asset: assets/fonts/uthmani.otf
    - family: Mushaf
      fonts:
        - asset: assets/fonts/mushaf.ttf
    - family: Hafs
      fonts:
        - asset: assets/fonts/hafs.ttf
    - family: Qalam
      fonts:
        - asset: assets/fonts/qalam.ttf