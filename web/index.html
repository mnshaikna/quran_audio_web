<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Quran Audio: Free Quran MP3 – Beautiful recitations from 50+ world-renowned Qaris. Mushaf view, prayer times, streaks and more. Free forever.">
  <meta name="keywords" content="Quran, Quran Audio, Free Quran MP3, Islamic app, Quran recitation, Qari, Mushaf">
  <meta property="og:title" content="Quran Audio: Free Quran MP3">
  <meta property="og:description" content="Listen to beautiful Quran recitations from 50+ world-renowned Qaris. Free forever.">
  <meta property="og:type" content="website">

  <title>Quran Audio: Free Quran MP3</title>
  <link rel="manifest" href="manifest.json">

  <!-- Preconnect for fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body { margin: 0; background-color: #060e0d; }
    #loading {
      position: fixed; inset: 0;
      background: #060e0d;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading .logo {
      width: 96px; height: 96px;
      border-radius: 22px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(61,155,138,0.25);
    }
    #loading .en {
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 4px;
      color: #3d9b8a;
      text-transform: uppercase;
    }
    #loading .dot-row { display: flex; gap: 8px; margin-top: 32px; }
    #loading .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #1a4a42;
      animation: pulse 1.4s ease-in-out infinite;
    }
    #loading .dot:nth-child(2) { animation-delay: 0.2s; }
    #loading .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { background: #1a4a42; transform: scale(1); }
      40% { background: #3d9b8a; transform: scale(1.4); }
    }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/app_icon.png" class="logo" alt="Quran Audio">
    <div class="en">Quran Audio</div>
    <div class="dot-row">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      loading.style.opacity = '0';
      setTimeout(() => loading.remove(), 500);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
